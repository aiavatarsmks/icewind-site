<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 88" width="340" height="88" role="img" aria-label="ICE WIND">
  <defs>
    <linearGradient id="gustA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="gustB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
  </defs>

  <!-- Wind gust mark -->
  <g fill="none" stroke-linecap="round">
    <!-- top gust, curls up -->
    <path d="M6 30 H46 c10 0 16 -7 12 -14 c-3 -6 -12 -6 -14 0" stroke="url(#gustA)" stroke-width="5"/>
    <!-- middle gust, longest, curls forward -->
    <path d="M2 44 H64 c11 0 17 8 12 15 c-4 6 -13 5 -15 -1" stroke="url(#gustB)" stroke-width="5"/>
    <!-- lower gust, short -->
    <path d="M10 58 H40" stroke="url(#gustA)" stroke-width="5"/>
  </g>
  <!-- ice crystals blown off the gusts -->
  <g fill="#e0f2fe">
    <path d="M70 24 l4 4 -4 4 -4 -4 z"/>
    <path d="M84 40 l3 3 -3 3 -3 -3 z" fill="#7dd3fc"/>
    <path d="M52 62 l3 3 -3 3 -3 -3 z" fill="#bae6fd"/>
  </g>

  <!-- Wordmark -->
  <text x="104" y="56" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="6" fill="url(#wordGrad)">ICE WIND</text>
</svg>
